<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammatikkveien mot A2 – Norsk for voksne</title>
<meta name="description" content="Interaktivt opplæringsprogram i norsk grammatikk mot nivå A2 (CEFR). For voksne deltakere.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   GRAMMATIKKVEIEN MOT A2
   Design: MBO-palett (Marine #003057, Teal #005F73, Amber #EE9B00)
   Alle fargepar oppfyller WCAG 2.1 AA (4.5:1 for normal tekst)
   ========================================================== */
:root{
  --marine:#003057;
  --marine-soft:#0d4571;
  --teal:#005F73;
  --teal-dark:#004a5a;
  --teal-tint:#E3F0F2;
  --amber:#EE9B00;          /* kun mørk tekst oppå! */
  --amber-tint:#FCEFD8;
  --bg:#F4F8FA;
  --card:#FFFFFF;
  --ink:#16293A;
  --muted:#4E6172;          /* 7.2:1 på hvit */
  --line:#D7E2E8;
  --success:#1B6E3C;        /* 5.9:1 på hvit */
  --success-tint:#E6F4EA;
  --error:#B3261E;          /* 6.6:1 på hvit */
  --error-tint:#FBEAE9;
  --focus:#0B63CE;
  --radius:14px;
  --shadow:0 1px 2px rgba(0,48,87,.06),0 4px 14px rgba(0,48,87,.08);
  --font:'Atkinson Hyperlegible',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}
body{
  margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);
  font-size:1.0625rem;line-height:1.6;
}
/* ---------- Hopp til innhold (UU) ---------- */
.skip-link{
  position:absolute;left:-999px;top:0;background:var(--marine);color:#fff;
  padding:.75rem 1.25rem;border-radius:0 0 var(--radius) 0;z-index:100;font-weight:700;
}
.skip-link:focus{left:0}
/* ---------- Fokusmarkering (UU) ---------- */
:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:4px}
/* ---------- Topplinje ---------- */
header.app-header{
  background:var(--marine);color:#fff;
  padding:.65rem 1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
  position:sticky;top:0;z-index:50;box-shadow:var(--shadow);
}
.brand{display:flex;align-items:center;gap:.6rem;min-width:0}
.brand-logo{
  width:40px;height:40px;border-radius:10px;background:var(--amber);color:var(--marine);
  display:grid;place-items:center;font-weight:700;font-size:1.15rem;flex-shrink:0;
}
.brand h1{font-size:1.1rem;margin:0;line-height:1.2;font-weight:700}
.brand .undertittel{font-size:.78rem;opacity:.85;display:block;font-weight:400}
/* ---------- Scoreboard ---------- */
.scoreboard{
  margin-left:auto;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;
}
.score-chip{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  border-radius:999px;padding:.3rem .85rem;font-size:.9rem;font-weight:700;
  display:flex;align-items:center;gap:.4rem;color:#fff;
}
.score-chip .ikon{font-size:1.05rem}
.score-chip.amber{background:var(--amber);color:var(--marine);border-color:var(--amber)}
/* ---------- Hovedoppsett ---------- */
.layout{display:grid;grid-template-columns:300px 1fr;gap:1.5rem;max-width:1240px;margin:1.5rem auto;padding:0 1rem}
@media (max-width:900px){.layout{grid-template-columns:1fr;margin-top:1rem}}
/* ---------- Navigasjon ---------- */
nav.tema-nav{align-self:start}
@media (min-width:901px){nav.tema-nav{position:sticky;top:76px;max-height:calc(100vh - 96px);overflow:auto;padding-right:.25rem}}
.nav-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem}
.nav-card h2{font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:.25rem 0 .75rem}
.nav-liste{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.25rem}
.nav-knapp{
  width:100%;display:flex;align-items:center;gap:.65rem;text-align:left;
  background:none;border:none;border-radius:10px;padding:.6rem .65rem;cursor:pointer;
  font:inherit;font-size:.97rem;color:var(--ink);min-height:44px;
}
.nav-knapp:hover{background:var(--teal-tint)}
.nav-knapp[aria-current="page"]{background:var(--teal);color:#fff;font-weight:700}
.nav-knapp[aria-current="page"] .ring-tekst{fill:#fff}
.nav-knapp .nav-ikon{font-size:1.2rem;width:1.5rem;text-align:center;flex-shrink:0}
.nav-knapp .nav-tittel{flex:1;min-width:0}
/* fremdriftsring */
.ring{flex-shrink:0}
.ring-bak{stroke:var(--line);fill:none}
.nav-knapp[aria-current="page"] .ring-bak{stroke:rgba(255,255,255,.3)}
.ring-frem{stroke:var(--amber);fill:none;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .4s ease}
.ring-tekst{font-size:9px;font-weight:700;fill:var(--muted);text-anchor:middle;dominant-baseline:central}
.nav-knapp.fullfort .ring-frem{stroke:var(--success)}
/* mobilmeny */
.nav-toggle{display:none}
@media (max-width:900px){
  .nav-toggle{
    display:flex;align-items:center;gap:.5rem;width:100%;justify-content:space-between;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:.8rem 1rem;font:inherit;font-weight:700;cursor:pointer;min-height:48px;color:var(--ink);
  }
  .nav-card{display:none;margin-top:.5rem}
  .nav-card.open{display:block}
}
/* ---------- Hovedinnhold ---------- */
main{min-width:0}
.kort{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.5rem;margin-bottom:1.25rem}
.kort h2{margin-top:0;color:var(--marine);font-size:1.5rem;line-height:1.25}
.kort h3{color:var(--teal);font-size:1.15rem;margin:1.5rem 0 .5rem}
.eyebrow{font-size:.8rem;text-transform:uppercase;letter-spacing:.1em;color:var(--teal);font-weight:700;margin:0 0 .25rem}
/* ---------- Hjem / dashbord ---------- */
.hero{
  background:linear-gradient(135deg,var(--marine) 0%,var(--teal) 100%);
  color:#fff;border-radius:var(--radius);padding:2rem 1.75rem;margin-bottom:1.25rem;box-shadow:var(--shadow);
}
.hero h2{margin:0 0 .5rem;font-size:1.7rem;color:#fff}
.hero p{margin:0;max-width:56ch;font-size:1.05rem;opacity:.95}
.hero .hero-knapp{margin-top:1.25rem}
.tema-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem}
.tema-kort{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:1.1rem;cursor:pointer;text-align:left;font:inherit;color:var(--ink);
  display:flex;flex-direction:column;gap:.5rem;min-height:44px;
  transition:transform .15s ease, box-shadow .15s ease;
}
.tema-kort:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--teal)}
.tema-kort .tk-topp{display:flex;align-items:center;gap:.6rem}
.tema-kort .tk-ikon{font-size:1.6rem}
.tema-kort .tk-tittel{font-weight:700;color:var(--marine);font-size:1.05rem}
.tema-kort .tk-besk{font-size:.9rem;color:var(--muted);margin:0}
.fremdriftslinje{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:auto}
.fremdriftslinje>span{display:block;height:100%;background:var(--amber);border-radius:99px;transition:width .4s ease}
.tema-kort.mestret .fremdriftslinje>span{background:var(--success)}
.tk-status{font-size:.8rem;font-weight:700;color:var(--muted)}
.tk-status.mestret{color:var(--success)}
/* ---------- Leksjon ---------- */
.eksempelboks{
  background:var(--teal-tint);border-left:5px solid var(--teal);
  border-radius:0 10px 10px 0;padding:.9rem 1.1rem;margin:.9rem 0;
}
.eksempelboks p{margin:.25rem 0}
.regelboks{
  background:var(--amber-tint);border-left:5px solid var(--amber);
  border-radius:0 10px 10px 0;padding:.9rem 1.1rem;margin:.9rem 0;
}
.regelboks strong:first-child{color:var(--marine)}
table.gtab{width:100%;border-collapse:collapse;margin:.75rem 0;font-size:1rem}
table.gtab caption{text-align:left;font-weight:700;color:var(--marine);padding-bottom:.4rem}
table.gtab th{background:var(--marine);color:#fff;text-align:left;padding:.55rem .7rem;font-size:.92rem}
table.gtab td{border:1px solid var(--line);padding:.5rem .7rem;background:#fff}
table.gtab tr:nth-child(even) td{background:#F7FAFC}
.uth{color:var(--teal);font-weight:700}
.uth2{background:var(--amber-tint);padding:0 .2em;border-radius:4px;font-weight:700}
/* ---------- Oppgaver ---------- */
.oppgave-omrade{margin-top:1rem}
.oppgave-status{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:.75rem}
.oppgave-teller{font-weight:700;color:var(--muted);font-size:.95rem}
.prikk-rad{display:flex;gap:.4rem;flex-wrap:wrap}
.prikk{width:12px;height:12px;border-radius:50%;background:var(--line)}
.prikk.aktiv{background:var(--teal);transform:scale(1.25)}
.prikk.riktig{background:var(--success)}
.prikk.feil{background:var(--error)}
.sporsmal{font-size:1.2rem;font-weight:700;color:var(--ink);margin:.5rem 0 1rem;line-height:1.5}
.sporsmal .luke{
  display:inline-block;min-width:4.5ch;border-bottom:3px solid var(--teal);
  text-align:center;color:var(--teal);font-style:normal;
}
.hint{color:var(--muted);font-size:.95rem;font-weight:400}
/* flervalg */
.alt-liste{display:flex;flex-direction:column;gap:.6rem;margin:0;padding:0;list-style:none}
.alt-knapp{
  width:100%;text-align:left;background:#fff;border:2px solid var(--line);border-radius:12px;
  padding:.8rem 1rem;font:inherit;font-size:1.05rem;cursor:pointer;min-height:48px;
  display:flex;align-items:center;gap:.7rem;color:var(--ink);
}
.alt-knapp:hover:not(:disabled){border-color:var(--teal);background:var(--teal-tint)}
.alt-knapp .alt-bokstav{
  width:30px;height:30px;border-radius:50%;background:var(--teal-tint);color:var(--teal);
  display:grid;place-items:center;font-weight:700;flex-shrink:0;font-size:.9rem;
}
.alt-knapp.valgt-riktig{border-color:var(--success);background:var(--success-tint)}
.alt-knapp.valgt-riktig .alt-bokstav{background:var(--success);color:#fff}
.alt-knapp.valgt-feil{border-color:var(--error);background:var(--error-tint)}
.alt-knapp.valgt-feil .alt-bokstav{background:var(--error);color:#fff}
.alt-knapp:disabled{cursor:default;opacity:.85}
/* fyll inn */
.fyll-rad{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.fyll-input{
  font:inherit;font-size:1.1rem;padding:.65rem .9rem;border:2px solid var(--line);
  border-radius:10px;min-width:200px;flex:1;max-width:320px;color:var(--ink);
}
.fyll-input:focus{border-color:var(--teal)}
.fyll-input.riktig{border-color:var(--success);background:var(--success-tint)}
.fyll-input.feil{border-color:var(--error);background:var(--error-tint)}
/* ordrekkefølge */
.ordre-svar{
  min-height:60px;border:2px dashed var(--teal);border-radius:12px;background:var(--teal-tint);
  padding:.6rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:.75rem;
}
.ordre-svar.tom::before{content:"Trykk på ordene under for å bygge setningen.";color:var(--muted);font-size:.95rem}
.ordre-bank{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
.ord-brikke{
  font:inherit;font-size:1.05rem;font-weight:700;background:#fff;color:var(--marine);
  border:2px solid var(--marine);border-radius:10px;padding:.5rem .9rem;cursor:pointer;min-height:44px;
}
.ord-brikke:hover:not(:disabled){background:var(--marine);color:#fff}
.ord-brikke:disabled{opacity:.35;cursor:default}
.ord-brikke.i-svar{background:var(--teal);border-color:var(--teal);color:#fff}
.ord-brikke.i-svar:hover{background:var(--teal-dark)}
/* knapper */
.knapp{
  font:inherit;font-weight:700;font-size:1.05rem;border:none;border-radius:12px;
  padding:.75rem 1.5rem;cursor:pointer;min-height:48px;display:inline-flex;align-items:center;gap:.5rem;
}
.knapp-primar{background:var(--teal);color:#fff}
.knapp-primar:hover:not(:disabled){background:var(--teal-dark)}
.knapp-primar:disabled{background:var(--line);color:var(--muted);cursor:default}
.knapp-sekundar{background:#fff;color:var(--teal);border:2px solid var(--teal)}
.knapp-sekundar:hover{background:var(--teal-tint)}
.knapp-amber{background:var(--amber);color:var(--marine)}
.knapp-amber:hover{background:#d98d00}
.knapp-liten{font-size:.92rem;padding:.45rem .9rem;min-height:40px}
.knapp-rad{display:flex;gap:.75rem;flex-wrap:wrap;margin-top:1rem}
/* tilbakemelding */
.tilbakemelding{
  border-radius:12px;padding:1rem 1.15rem;margin-top:1rem;font-size:1.05rem;display:none;
}
.tilbakemelding.vis{display:block}
.tilbakemelding.riktig{background:var(--success-tint);border:2px solid var(--success);color:#11502B}
.tilbakemelding.feil{background:var(--error-tint);border:2px solid var(--error);color:#7E1B15}
.tilbakemelding.provigjen{background:var(--amber-tint);border:2px solid var(--amber);color:#5C3D00}
.tilbakemelding .tm-tittel{font-weight:700;font-size:1.1rem;display:block;margin-bottom:.25rem}
.tilbakemelding .tm-forklaring{margin:.4rem 0 0;font-size:.98rem}
/* fullført-skjerm */
.fullfort-skjerm{text-align:center;padding:2rem 1rem}
.fullfort-skjerm .stor-ikon{font-size:4rem;display:block;margin-bottom:.5rem}
.fullfort-skjerm h3{color:var(--marine);font-size:1.6rem;margin:.25rem 0}
.resultat-tall{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin:1.5rem 0}
.resultat-boks{background:var(--bg);border-radius:12px;padding:1rem 1.5rem;min-width:120px}
.resultat-boks .rt-tall{font-size:2rem;font-weight:700;color:var(--teal);display:block}
.resultat-boks .rt-navn{font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
/* min fremgang */
.fremgang-tabell{width:100%;border-collapse:collapse;font-size:.98rem}
.fremgang-tabell th{background:var(--marine);color:#fff;text-align:left;padding:.6rem .7rem}
.fremgang-tabell td{border-bottom:1px solid var(--line);padding:.6rem .7rem;vertical-align:middle}
.status-merke{display:inline-block;padding:.15rem .7rem;border-radius:99px;font-size:.82rem;font-weight:700}
.status-merke.ikke{background:var(--line);color:var(--muted)}
.status-merke.pabegynt{background:var(--amber-tint);color:#5C3D00}
.status-merke.fullfort{background:var(--teal-tint);color:var(--teal)}
.status-merke.mestret{background:var(--success-tint);color:var(--success)}
.niva-banner{
  display:flex;align-items:center;gap:1rem;background:var(--amber-tint);
  border:2px solid var(--amber);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem;flex-wrap:wrap;
}
.niva-banner .nb-ikon{font-size:2.4rem}
.niva-banner .nb-navn{font-weight:700;color:var(--marine);font-size:1.2rem}
.niva-banner .nb-info{color:#5C3D00;font-size:.95rem}
/* feiring */
@keyframes hopp{0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}}
.feir{display:inline-block;animation:hopp .7s ease 2}
footer.app-footer{text-align:center;color:var(--muted);font-size:.85rem;padding:1.5rem 1rem 2.5rem}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
@media (max-width:560px){
  .kort{padding:1.1rem}
  .sporsmal{font-size:1.1rem}
  .scoreboard{width:100%;margin-left:0;justify-content:flex-start}
}
</style>
</head>
<body>
<a class="skip-link" href="#hovedinnhold">Hopp til innholdet</a>

<header class="app-header">
  <div class="brand">
    <div class="brand-logo" aria-hidden="true">A2</div>
    <h1>Grammatikkveien mot A2
      <span class="undertittel">Norsk grammatikk for voksne · CEFR A2</span>
    </h1>
  </div>
  <div class="scoreboard" role="group" aria-label="Poengtavle">
    <span class="score-chip amber" id="chip-poeng" title="Poengsum"><span class="ikon" aria-hidden="true">⭐</span><span id="poeng-tall">0</span><span class="sr-only">poeng</span></span>
    <span class="score-chip" id="chip-streak" title="Riktige svar på rad"><span class="ikon" aria-hidden="true">🔥</span><span id="streak-tall">0</span><span class="sr-only">riktige på rad</span></span>
    <span class="score-chip" id="chip-niva" title="Ditt nivå"><span class="ikon" aria-hidden="true">🎓</span><span id="niva-navn">Nybegynner</span></span>
  </div>
</header>

<div class="layout">
  <nav class="tema-nav" aria-label="Grammatikktemaer">
    <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-card">
      <span>📚 Velg tema</span><span aria-hidden="true">▾</span>
    </button>
    <div class="nav-card" id="nav-card">
      <h2>Meny</h2>
      <ul class="nav-liste" id="nav-faste"></ul>
      <h2>Grammatikktemaer</h2>
      <ul class="nav-liste" id="nav-temaer"></ul>
    </div>
  </nav>

  <main id="hovedinnhold" tabindex="-1">
    <div id="visning"></div>
  </main>
</div>

<footer class="app-footer">
  Grammatikkveien mot A2 · Basert på CEFR-rammeverket · Laget for voksne deltakere i norskopplæring
</footer>

<script>
/* ==========================================================
   GRAMMATIKKDATA – 12 temaer mot CEFR A2
   Oppgavetyper: mc (flervalg), fyll (fyll inn), ordre (ordrekkefølge)
   ========================================================== */
const TEMAER = [

/* ---------- 1. SETNINGER OG V2-REGELEN ---------- */
{
id:'v2', ikon:'🧱', tittel:'Setninger og V2-regelen',
kort:'Verbet står alltid på plass nummer to.',
leksjon:`
<p>En norsk setning har ofte denne rekkefølgen: <span class="uth">subjekt + verb + resten</span>.</p>
<div class="eksempelboks">
  <p>Jeg <span class="uth2">spiser</span> frokost klokka sju.</p>
  <p>Vi <span class="uth2">bor</span> i Molde.</p>
</div>
<div class="regelboks">
  <strong>V2-regelen:</strong> Verbet står <strong>alltid på plass nummer to</strong> i en fortellende setning.
  Hvis setningen begynner med noe annet enn subjektet (for eksempel tid eller sted), bytter subjektet og verbet plass. Dette kaller vi <strong>inversjon</strong>.
</div>
<table class="gtab">
<caption>Se hva som skjer når vi flytter «klokka sju» først:</caption>
<tr><th>Plass 1</th><th>Plass 2 (verb)</th><th>Resten</th></tr>
<tr><td>Jeg</td><td><strong>spiser</strong></td><td>frokost klokka sju.</td></tr>
<tr><td>Klokka sju</td><td><strong>spiser</strong></td><td>jeg frokost.</td></tr>
<tr><td>I dag</td><td><strong>jobber</strong></td><td>hun hjemme.</td></tr>
<tr><td>Om sommeren</td><td><strong>reiser</strong></td><td>vi til Spania.</td></tr>
</table>
<p>Legg merke til: Verbet er <em>alltid</em> nummer to – men subjektet kan flytte seg!</p>`,
oppgaver:[
{type:'mc', sp:'Hvilken setning er riktig?',
 alt:['I dag jeg jobber hjemme.','I dag jobber jeg hjemme.','I dag jeg hjemme jobber.'], riktig:1,
 fb:'Setningen begynner med «I dag». Da må verbet «jobber» stå på plass nummer to: I dag + jobber + jeg.'},
{type:'ordre', instruks:'Bygg en riktig setning. Begynn med «Klokka».',
 ord:['Klokka','åtte','spiser','jeg','frokost'], svar:'Klokka åtte spiser jeg frokost',
 fb:'«Klokka åtte» står først, så kommer verbet «spiser» på plass to, og deretter subjektet «jeg».'},
{type:'mc', sp:'På lørdag ___ til Ålesund.',
 alt:['reiser vi','vi reiser','vi skal'], riktig:0,
 fb:'«På lørdag» står først, så verbet «reiser» må komme på plass to. Subjektet «vi» kommer etter verbet.'},
{type:'ordre', instruks:'Bygg en riktig setning. Begynn med «I».',
 ord:['I','morgen','skal','hun','jobbe'], svar:'I morgen skal hun jobbe',
 fb:'«I morgen» står først → verbet «skal» på plass to → subjektet «hun» etterpå.'},
{type:'mc', sp:'Hvilken setning er riktig?',
 alt:['Nå vi drikker kaffe.','Vi nå drikker kaffe.','Nå drikker vi kaffe.'], riktig:2,

/* ---------- 3. VERB I PRESENS ---------- */
{
id:'presens', ikon:'▶️', tittel:'Verb i presens',
kort:'Det som skjer nå eller ofte: infinitiv + r.',
leksjon:`
<p>Vi bruker <span class="uth">presens</span> om noe som skjer <strong>nå</strong>, eller noe som skjer <strong>ofte / hver dag</strong>.</p>
<div class="regelboks">
  <strong>Regel:</strong> infinitiv + <strong>r</strong>. Formen er lik for alle: jeg, du, han, hun, vi, dere, de.<br>
  å bo → bo<strong>r</strong> · å spise → spise<strong>r</strong> · å jobbe → jobbe<strong>r</strong>
</div>
<table class="gtab">
<caption>Noen viktige verb har spesiell presensform:</caption>
<tr><th>Infinitiv</th><th>Presens</th><th>Eksempel</th></tr>
<tr><td>å være</td><td><strong>er</strong></td><td>Jeg er lærer.</td></tr>
<tr><td>å gjøre</td><td><strong>gjør</strong></td><td>Hva gjør du?</td></tr>
<tr><td>å vite</td><td><strong>vet</strong></td><td>Jeg vet ikke.</td></tr>
<tr><td>å si</td><td><strong>sier</strong></td><td>Hun sier hei.</td></tr>
<tr><td>å spørre</td><td><strong>spør</strong></td><td>Læreren spør meg.</td></tr>
</table>
<div class="eksempelboks">
  <p>Jeg <span class="uth2">bor</span> i Molde. · Hun <span class="uth2">leser</span> hver kveld. · Vi <span class="uth2">er</span> på kurs nå.</p>
</div>`,
oppgaver:[
{type:'fyll', sp:'Jeg ___ i Molde.', hint:'(å bo)', svar:['bor'],

{type:'fyll', sp:'Hun ___ norsk hver dag.', hint:'(å lese)', svar:['leser'],

{

kort:'Fortid med tidspunkt: i går, i fjor, for to år siden.',
leksjon:`
<p>Vi bruker <span class="uth">preteritum</span> om noe som skjedde i fortiden, ofte med et <strong>tidspunkt</strong>: i går, i fjor, forrige uke, for tre år siden.</p>

<tr><th>Gruppe</th><th>Infinitiv</th><th>Preteritum</th></tr>
<tr><td>1: -et</td><td>å snakke, å jobbe, å våkne</td><td>snakk<strong>et</strong>, jobb<strong>et</strong>, vakn<strong>et</strong></td></tr>
<tr><td>2: -te</td><td>å spise, å lese, å kjøpe</td><td>spis<strong>te</strong>, les<strong>te</strong>, kjøp<strong>te</strong></td></tr>
<tr><td>3: -de</td><td>å prøve, å leve</td><td>prøv<strong>de</strong>, lev<strong>de</strong></td></tr>

</table>

<tr><th>Infinitiv</th><th>Preteritum</th><th>Infinitiv</th><th>Preteritum</th></tr>
<tr><td>å være</td><td><strong>var</strong></td><td>å komme</td><td><strong>kom</strong></td></tr>

/* ---------- 5. PERFEKTUM ---------- */
{
id:'perfektum', ikon:'✅', tittel:'Perfektum (har + verb)',
kort:'Har bodd, har spist – når tidspunktet ikke er viktig.',
leksjon:`
<p>Vi bruker <span class="uth">perfektum</span> når noe har skjedd, men <strong>tidspunktet ikke er viktig</strong> – eller når noe begynte i fortiden og fortsetter nå.</p>
<div class="regelboks">
  <strong>Regel:</strong> har + perfektum partisipp.<br>
  Jeg <strong>har bodd</strong> i Norge i tre år. (Jeg bor her fortsatt!)<br>
  <strong>Har</strong> du <strong>spist</strong> frokost? (Tidspunktet er ikke viktig – resultatet er viktig.)
</div>
<table class="gtab">
<caption>Vanlige partisippformer:</caption>
<tr><th>Infinitiv</th><th>Perfektum</th><th>Infinitiv</th><th>Perfektum</th></tr>
<tr><td>å snakke</td><td>har snakk<strong>et</strong></td><td>å være</td><td>har <strong>vært</strong></td></tr>
<tr><td>å spise</td><td>har spis<strong>t</strong></td><td>å gjøre</td><td>har <strong>gjort</strong></td></tr>
<tr><td>å lese</td><td>har les<strong>t</strong></td><td>å se</td><td>har <strong>sett</strong></td></tr>
<tr><td>å bo</td><td>har bo<strong>dd</strong></td><td>å skrive</td><td>har <strong>skrevet</strong></td></tr>
<tr><td>å lære</td><td>har lær<strong>t</strong></td><td>å gå</td><td>har <strong>gått</strong></td></tr>
</table>
<div class="eksempelboks">
  <p><strong>Sammenlign:</strong></p>
  <p>Preteritum: Jeg <span class="uth2">bodde</span> i Oslo <strong>i 2019</strong>. (tidspunkt – ferdig)</p>
  <p>Perfektum: Jeg <span class="uth2">har bodd</span> i Norge <strong>i tre år</strong>. (fortsetter nå)</p>
</div>`,

kort:'Kan, vil, skal, må, bør + infinitiv uten «å».',
leksjon:`
<p>Modalverb forteller om mulighet, ønske, plan, plikt eller råd. De står sammen med et annet verb.</p>
<div class="regelboks">
  <strong>Viktig regel:</strong> Etter modalverb kommer infinitiv <strong>uten «å»</strong>!<br>
  Jeg kan <strong>snakke</strong> norsk. <span style="color:var(--error)">(IKKE: kan å snakke)</span>
</div>
<table class="gtab">
<caption>De fem viktigste modalverbene:</caption>
<tr><th>Modalverb</th><th>Betydning</th><th>Eksempel</th></tr>
<tr><td><strong>kan</strong></td><td>mulighet, evne</td><td>Jeg kan svømme.</td></tr>
<tr><td><strong>vil</strong></td><td>ønske</td><td>Hun vil bli sykepleier.</td></tr>
<tr><td><strong>skal</strong></td><td>plan, avtale</td><td>Vi skal reise i sommer.</td></tr>
<tr><td><strong>må</strong></td><td>plikt, nødvendig</td><td>Du må ha billett.</td></tr>
<tr><td><strong>bør</strong></td><td>råd (det er lurt)</td><td>Du bør sove mer.</td></tr>
</table>
<div class="eksempelboks">
  <p>Kan du <span class="uth2">hjelpe</span> meg? · Jeg må <span class="uth2">gå</span> nå. · Vi skal <span class="uth2">jobbe</span> i morgen.</p>
</div>`,

/* ---------- 7. SUBSTANTIV ---------- */
{
id:'substantiv', ikon:'📦', tittel:'Substantiv: en, ei, et',
kort:'Kjønn, bestemt form og flertall.',
leksjon:`
<p>Norske substantiv har tre kjønn: <span class="uth">en</span> (hankjønn), <span class="uth">ei</span> (hunkjønn) og <span class="uth">et</span> (intetkjønn). Du må lære kjønnet sammen med ordet!</p>
<table class="gtab">
<caption>De fire formene av substantivet:</caption>
<tr><th>Ubestemt entall</th><th>Bestemt entall</th><th>Ubestemt flertall</th><th>Bestemt flertall</th></tr>
<tr><td>en bil</td><td>bil<strong>en</strong></td><td>bil<strong>er</strong></td><td>bil<strong>ene</strong></td></tr>
<tr><td>ei jente</td><td>jent<strong>a</strong></td><td>jent<strong>er</strong></td><td>jent<strong>ene</strong></td></tr>
<tr><td>et hus</td><td>hus<strong>et</strong></td><td>hus</td><td>hus<strong>ene</strong></td></tr>
<tr><td>et eple</td><td>eple<strong>t</strong></td><td>epl<strong>er</strong></td><td>epl<strong>ene</strong></td></tr>
</table>
<div class="regelboks">
  <strong>Husk:</strong> Korte et-ord (én stavelse) får <strong>ingen endelse</strong> i ubestemt flertall: et hus → mange hus, et barn → mange barn, et brev → mange brev.
</div>
<table class="gtab">
<caption>Noen ord er uregelmessige:</caption>
<tr><th>Entall</th><th>Flertall</th></tr>
<tr><td>en mann</td><td>mange <strong>menn</strong></td></tr>
<tr><td>ei bok</td><td>mange <strong>bøker</strong></td></tr>
<tr><td>et barn</td><td>mange <strong>barn</strong> (barna i bestemt form)</td></tr>
<tr><td>en lærer</td><td>mange <strong>lærere</strong></td></tr>
</table>`,

/* ---------- 8. PRONOMEN OG EIENDOMSORD ---------- */
{
id:'pronomen', ikon:'👥', tittel:'Pronomen og eiendomsord',
kort:'Jeg/meg, han/ham, min/mitt/mine.',
leksjon:`
<p>Pronomen har to former: én når personen <strong>gjør noe</strong> (subjekt), og én når noe <strong>skjer med personen</strong> (objekt).</p>
<table class="gtab">
<caption>Subjekt og objekt:</caption>
<tr><th>Subjekt</th><th>Objekt</th><th>Eksempel</th></tr>
<tr><td>jeg</td><td><strong>meg</strong></td><td>Kan du hjelpe meg?</td></tr>
<tr><td>du</td><td><strong>deg</strong></td><td>Jeg ser deg.</td></tr>
<tr><td>han</td><td><strong>ham</strong></td><td>Vi kjenner ham.</td></tr>
<tr><td>hun</td><td><strong>henne</strong></td><td>Jeg ringer henne.</td></tr>

/* ==========================================================
   MOTOR – tilstand, lagring, navigasjon, oppgaver, fremgang
   ========================================================== */
const NIVAER = [
  {grense:0,   navn:'Nybegynner',     ikon:'🌱'},
  {grense:100, navn:'Lærling',        ikon:'📖'},
  {grense:250, navn:'På god vei',     ikon:'🚶'},
  {grense:500, navn:'A2-utforsker',   ikon:'🧭'},
  {grense:800, navn:'Grammatikkhelt', ikon:'🏆'}
];
const ROS = ['Riktig! Flott jobbet!','Helt riktig! Du er på god vei!','Supert! Det stemmer!','Bra! Du kan dette!','Riktig! Fortsett sånn!','Perfekt svar!'];
const PROV_IGJEN = ['Ikke helt riktig – men du klarer det! Prøv en gang til.','Nesten! Se på hintet og prøv igjen.','Det var ikke riktig, men det går bra. Prøv igjen!'];
const TROST = ['Det var ikke riktig denne gangen – men nå lærer du noe nytt!','Ikke riktig, men feil er en del av læringen. Se forklaringen under.','Det stemte ikke helt. Les forklaringen – så husker du det neste gang!'];

/* ---------- Lagring (med trygg reserve hvis localStorage ikke finnes) ---------- */
const LAGER_NOKKEL = 'grammatikkveienA2_v1';
let minneLager = null;
function lesTilstand(){
  try{ const r = localStorage.getItem(LAGER_NOKKEL); if(r) return JSON.parse(r); }catch(e){ if(minneLager) return minneLager; }
  return {poeng:0, streak:0, besteStreak:0, temaer:{}};
}
function lagreTilstand(){
  minneLager = tilstand;
  try{ localStorage.setItem(LAGER_NOKKEL, JSON.stringify(tilstand)); }catch(e){}
}
let tilstand = lesTilstand();
function temaData(id){
  if(!tilstand.temaer[id]) tilstand.temaer[id] = {besvart:0, riktigForsteForsok:0, fullfort:false, besteProsent:0};
  return tilstand.temaer[id];
}

/* ---------- Hjelpere ---------- */
const $ = s => document.querySelector(s);
function esc(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function bland(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function tilfeldig(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function normaliser(s){ return s.trim().toLowerCase().replace(/\s+/g,' '); }

/* ---------- Poengtavle ---------- */
function nivaFor(poeng){ let n=NIVAER[0]; for(const niv of NIVAER){ if(poeng>=niv.grense) n=niv; } return n; }
function oppdaterTavle(){
  $('#poeng-tall').textContent = tilstand.poeng;
  $('#streak-tall').textContent = tilstand.streak;
  const n = nivaFor(tilstand.poeng);
  $('#niva-navn').textContent = n.navn;
  $('#chip-niva .ikon').textContent = n.ikon;
}

/* ---------- Navigasjon ---------- */
let gjeldendeVisning = {type:'hjem'};
function progressRing(prosent, fullfort){
  const r=13, o=2*Math.PI*r, off=o*(1-prosent/100);
  return `<svg class="ring" width="34" height="34" viewBox="0 0 34 34" aria-hidden="true">
    <circle class="ring-bak" cx="17" cy="17" r="${r}" stroke-width="3.5"></circle>
    <circle class="ring-frem" cx="17" cy="17" r="${r}" stroke-width="3.5" stroke-dasharray="${o}" stroke-dashoffset="${off}"></circle>
    <text class="ring-tekst" x="17" y="18">${fullfort?'✓':prosent>0?Math.round(prosent)+'%':''}</text></svg>`;
}
function byggNav(){
  $('#nav-faste').innerHTML = `
    <li><button class="nav-knapp" data-vis="hjem" ${gjeldendeVisning.type==='hjem'?'aria-current="page"':''}><span class="nav-ikon" aria-hidden="true">🏠</span><span class="nav-tittel">Hjem</span></button></li>
    <li><button class="nav-knapp" data-vis="fremgang" ${gjeldendeVisning.type==='fremgang'?'aria-current="page"':''}><span class="nav-ikon" aria-hidden="true">📊</span><span class="nav-tittel">Min fremgang</span></button></li>`;
  $('#nav-temaer').innerHTML = TEMAER.map((t,i)=>{
    const d = tilstand.temaer[t.id];
    const prosent = d ? Math.round(d.besvart/t.oppgaver.length*100) : 0;
    const aktiv = gjeldendeVisning.type==='tema' && gjeldendeVisning.id===t.id;
    return `<li><button class="nav-knapp ${d&&d.fullfort?'fullfort':''}" data-tema="${t.id}" ${aktiv?'aria-current="page"':''}>
      <span class="nav-ikon" aria-hidden="true">${t.ikon}</span>
      <span class="nav-tittel">${i+1}. ${t.tittel}</span>
      ${progressRing(Math.min(prosent,100), d&&d.fullfort)}</button></li>`;
  }).join('');
  document.querySelectorAll('#nav-faste .nav-knapp').forEach(b=>b.addEventListener('click',()=>{ vis({type:b.dataset.vis}); lukkMobilNav(); }));
  document.querySelectorAll('#nav-temaer .nav-knapp').forEach(b=>b.addEventListener('click',()=>{ vis({type:'tema', id:b.dataset.tema}); lukkMobilNav(); }));
}
function lukkMobilNav(){
  const t=$('#nav-toggle'), c=$('#nav-card');
  if(getComputedStyle(t).display!=='none'){ c.classList.remove('open'); t.setAttribute('aria-expanded','false'); }
}
$('#nav-toggle').addEventListener('click',()=>{
  const c=$('#nav-card'), apen=c.classList.toggle('open');
  $('#nav-toggle').setAttribute('aria-expanded', apen?'true':'false');
});

/* ---------- Visninger ---------- */
function vis(v){
  gjeldendeVisning = v;
  byggNav();
  if(v.type==='hjem') visHjem();
  else if(v.type==='fremgang') visFremgang();
  else if(v.type==='tema') visTema(v.id);
  else if(v.type==='ovelse') startOvelse(v.id);
  $('#hovedinnhold').focus({preventScroll:true});
  window.scrollTo({top:0});
}

/* ---------- HJEM ---------- */
function visHjem(){
  const fullforte = TEMAER.filter(t=>tilstand.temaer[t.id]&&tilstand.temaer[t.id].fullfort).length;
  $('#visning').innerHTML = `
  <section class="hero">
    <p class="eyebrow" style="color:var(--amber)">Norsk grammatikk · CEFR-nivå A2</p>
    <h2>Velkommen til Grammatikkveien!</h2>
    <p>Her øver du på all grammatikken du trenger på veien mot norskprøven A2.
    Velg et tema, les den korte forklaringen, og øv med oppgavene.
    Du får poeng for hvert riktig svar – og gode forklaringer når noe er feil. Lykke til!</p>
    ${fullforte>0?`<p style="margin-top:.75rem"><strong>Du har fullført ${fullforte} av ${TEMAER.length} temaer. Godt jobbet!</strong></p>`:''}
    <button class="knapp knapp-amber hero-knapp" id="hero-start">${fullforte>0?'Fortsett å øve':'Start med tema 1'} →</button>
  </section>
  <h2 class="sr-only">Alle grammatikktemaer</h2>
  <div class="tema-grid">
    ${TEMAER.map((t,i)=>{
      const d=tilstand.temaer[t.id];
      const prosent=d?Math.min(Math.round(d.besvart/t.oppgaver.length*100),100):0;
      const mestret=d&&d.fullfort&&d.besteProsent>=80;
      let status='Ikke startet';
      if(mestret) status='Mestret ⭐'; else if(d&&d.fullfort) status='Fullført'; else if(prosent>0) status='Påbegynt';
      return `<button class="tema-kort ${mestret?'mestret':''}" data-tema="${t.id}">
        <span class="tk-topp"><span class="tk-ikon" aria-hidden="true">${t.ikon}</span><span class="tk-tittel">${i+1}. ${t.tittel}</span></span>
        <p class="tk-besk">${t.kort}</p>
        <span class="tk-status ${mestret?'mestret':''}">${status}</span>
        <span class="fremdriftslinje" role="progressbar" aria-valuenow="${prosent}" aria-valuemin="0" aria-valuemax="100" aria-label="Fremdrift ${t.tittel}"><span style="width:${prosent}%"></span></span>
      </button>`;
    }).join('')}
  </div>`;
  $('#hero-start').addEventListener('click',()=>{
    const neste = TEMAER.find(t=>!(tilstand.temaer[t.id]&&tilstand.temaer[t.id].fullfort)) || TEMAER[0];
    vis({type:'tema', id:neste.id});
  });
  document.querySelectorAll('.tema-kort').forEach(k=>k.addEventListener('click',()=>vis({type:'tema', id:k.dataset.tema})));
}

/* ---------- TEMA (leksjon) ---------- */
function visTema(id){
  const t = TEMAER.find(x=>x.id===id);
  const i = TEMAER.indexOf(t);
  $('#visning').innerHTML = `
  <article class="kort">
    <p class="eyebrow">Tema ${i+1} av ${TEMAER.length}</p>
    <h2>${t.ikon} ${t.tittel}</h2>
    ${t.leksjon}
    <div class="knapp-rad">
      <button class="knapp knapp-primar" id="start-ovelse">Øv nå (${t.oppgaver.length} oppgaver) →</button>
      <button class="knapp knapp-sekundar" id="til-hjem">← Tilbake til oversikten</button>
    </div>
  </article>`;
  $('#start-ovelse').addEventListener('click',()=>vis({type:'ovelse', id}));
  $('#til-hjem').addEventListener('click',()=>vis({type:'hjem'}));
}

/* ---------- ØVELSE ---------- */
let okt = null; // {temaId, indeks, forsok, resultater[], ordSvar[]}
function startOvelse(id){
  const t = TEMAER.find(x=>x.id===id);
  okt = {temaId:id, indeks:0, forsok:0, resultater:Array(t.oppgaver.length).fill(null), ordSvar:[]};
  gjeldendeVisning = {type:'tema', id};
  byggNav();
  tegnOppgave();
}
function tegnOppgave(){
  const t = TEMAER.find(x=>x.id===okt.temaId);
  const o = t.oppgaver[okt.indeks];
  okt.forsok = 0; okt.ordSvar = [];
  const prikker = okt.resultater.map((r,i)=>`<span class="prikk ${i===okt.indeks?'aktiv':''} ${r===true?'riktig':r===false?'feil':''}"></span>`).join('');
  let oppgaveHTML='';
  if(o.type==='mc'){
    oppgaveHTML = `<p class="sporsmal">${o.sp.replace('___','<span class="luke">___</span>')}</p>
      <ul class="alt-liste">${o.alt.map((a,i)=>`<li><button class="alt-knapp" data-i="${i}"><span class="alt-bokstav" aria-hidden="true">${'ABC'[i]}</span><span>${esc(a)}</span></button></li>`).join('')}</ul>`;
  } else if(o.type==='fyll'){
    oppgaveHTML = `<p class="sporsmal">${o.sp.replace('___','<span class="luke">___</span>')} <span class="hint">${o.hint||''}</span></p>
      <div class="fyll-rad">
        <label class="sr-only" for="fyll-felt">Skriv svaret ditt</label>
        <input class="fyll-input" id="fyll-felt" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Skriv svaret her">
        <button class="knapp knapp-primar" id="sjekk-knapp">Sjekk svaret</button>
      </div>`;
  } else if(o.type==='ordre'){
    const blandet = bland(o.ord.map((w,i)=>({w,i})));
    oppgaveHTML = `<p class="sporsmal">${esc(o.instruks||'Sett ordene i riktig rekkefølge.')}</p>
      <div class="ordre-svar tom" id="ordre-svar" aria-label="Setningen din"></div>
      <div class="ordre-bank" id="ordre-bank">${blandet.map(x=>`<button class="ord-brikke" data-i="${x.i}">${esc(x.w)}</button>`).join('')}</div>
      <div class="knapp-rad" style="margin-top:.25rem">
        <button class="knapp knapp-primar" id="sjekk-knapp" disabled>Sjekk setningen</button>
        <button class="knapp knapp-sekundar knapp-liten" id="tom-knapp">Begynn på nytt</button>
      </div>`;
  }
  $('#visning').innerHTML = `
  <article class="kort">
    <div class="oppgave-status">
      <span class="oppgave-teller">${t.ikon} ${t.tittel} · Oppgave ${okt.indeks+1} av ${t.oppgaver.length}</span>
      <span class="prikk-rad" aria-hidden="true">${prikker}</span>
    </div>
    <div class="oppgave-omrade">${oppgaveHTML}</div>
    <div class="tilbakemelding" id="tilbakemelding" role="status" aria-live="polite"></div>
    <div class="knapp-rad" id="neste-rad" style="display:none">
      <button class="knapp knapp-primar" id="neste-knapp">${okt.indeks+1<t.oppgaver.length?'Neste oppgave →':'Se resultatet ditt →'}</button>
    </div>
    <div class="knapp-rad">
      <button class="knapp knapp-sekundar knapp-liten" id="avbryt-knapp">← Tilbake til forklaringen</button>
    </div>
  </article>`;
  $('#avbryt-knapp').addEventListener('click',()=>vis({type:'tema', id:okt.temaId}));
  if(o.type==='mc'){
    document.querySelectorAll('.alt-knapp').forEach(b=>b.addEventListener('click',()=>svarMC(parseInt(b.dataset.i))));
  } else if(o.type==='fyll'){
    $('#sjekk-knapp').addEventListener('click',svarFyll);
    $('#fyll-felt').addEventListener('keydown',e=>{ if(e.key==='Enter') svarFyll(); });
    $('#fyll-felt').focus();
  } else if(o.type==='ordre'){
    document.querySelectorAll('.ord-brikke').forEach(b=>b.addEventListener('click',()=>brikkeKlikk(b)));
    $('#sjekk-knapp').addEventListener('click',svarOrdre);
    $('#tom-knapp').addEventListener('click',()=>{ okt.ordSvar=[]; tegnOrdreSvar(); });
  }
}
function brikkeKlikk(b){
  const i = parseInt(b.dataset.i);
  const pos = okt.ordSvar.indexOf(i);
  if(pos>-1) okt.ordSvar.splice(pos,1); else okt.ordSvar.push(i);
  tegnOrdreSvar();
}
function tegnOrdreSvar(){
  const t = TEMAER.find(x=>x.id===okt.temaId);
  const o = t.oppgaver[okt.indeks];
  const sv = $('#ordre-svar');
  sv.classList.toggle('tom', okt.ordSvar.length===0);
  sv.innerHTML = okt.ordSvar.map(i=>`<button class="ord-brikke i-svar" data-i="${i}" aria-label="Fjern ordet ${esc(o.ord[i])}">${esc(o.ord[i])}</button>`).join('');
  sv.querySelectorAll('.ord-brikke').forEach(b=>b.addEventListener('click',()=>brikkeKlikk(b)));
  document.querySelectorAll('#ordre-bank .ord-brikke').forEach(b=>{ b.disabled = okt.ordSvar.includes(parseInt(b.dataset.i)); });
  $('#sjekk-knapp').disabled = okt.ordSvar.length!==o.ord.length;
}

/* ---------- Svarbehandling ---------- */
function gjeldendeOppgave(){ return TEMAER.find(x=>x.id===okt.temaId).oppgaver[okt.indeks]; }
function svarMC(valgt){
  const o = gjeldendeOppgave();
  document.querySelectorAll('.alt-knapp').forEach(b=>b.disabled=true);
  const knapper = document.querySelectorAll('.alt-knapp');
  if(valgt===o.riktig){
    knapper[valgt].classList.add('valgt-riktig');
    fullforOppgave(true, o.fb);
  } else {
    knapper[valgt].classList.add('valgt-feil');
    knapper[o.riktig].classList.add('valgt-riktig');
    fullforOppgave(false, o.fb, o.alt[o.riktig]);
  }
}
function svarFyll(){
  const o = gjeldendeOppgave();
  const felt = $('#fyll-felt');
  const svar = normaliser(felt.value);
  if(!svar) { felt.focus(); return; }
  const riktig = o.svar.map(normaliser).includes(svar);
  if(riktig){
    felt.classList.remove('feil'); felt.classList.add('riktig'); felt.disabled=true; $('#sjekk-knapp').disabled=true;
    fullforOppgave(okt.forsok===0, o.fb, null, okt.forsok>0);
  } else {
    okt.forsok++;
    if(okt.forsok<2){
      felt.classList.add('feil');
      visTilbakemelding('provigjen', tilfeldig(PROV_IGJEN), null, null);
      felt.select(); felt.focus();
    } else {
      felt.classList.add('feil'); felt.disabled=true; $('#sjekk-knapp').disabled=true;
      fullforOppgave(false, o.fb, o.svar[0]);
    }
  }
}
function svarOrdre(){
  const o = gjeldendeOppgave();
  const setning = okt.ordSvar.map(i=>o.ord[i]).join(' ');
  const riktig = normaliser(setning)===normaliser(o.svar);
  if(riktig){
    document.querySelectorAll('.ord-brikke').forEach(b=>b.disabled=true);
    $('#sjekk-knapp').disabled=true; $('#tom-knapp').disabled=true;
    fullforOppgave(okt.forsok===0, o.fb, null, okt.forsok>0);
  } else {
    okt.forsok++;
    if(okt.forsok<2){
      visTilbakemelding('provigjen', tilfeldig(PROV_IGJEN)+' Trykk på «Begynn på nytt» og bygg setningen igjen.', null, null);
    } else {
      document.querySelectorAll('.ord-brikke').forEach(b=>b.disabled=true);
      $('#sjekk-knapp').disabled=true; $('#tom-knapp').disabled=true;
      fullforOppgave(false, o.fb, o.svar);
    }
  }
}
function fullforOppgave(forsteForsokRiktig, forklaring, riktigSvar, andreForsok){
  const d = temaData(okt.temaId);
  const erNyBesvarelse = okt.resultater[okt.indeks]===null;
  okt.resultater[okt.indeks] = !!(forsteForsokRiktig || andreForsok);
  if(erNyBesvarelse) d.besvart = Math.min(d.besvart+1, TEMAER.find(x=>x.id===okt.temaId).oppgaver.length);
  if(forsteForsokRiktig){
    tilstand.poeng += 10; tilstand.streak += 1;
    tilstand.besteStreak = Math.max(tilstand.besteStreak, tilstand.streak);
    d.riktigForsteForsok += 1;
    visTilbakemelding('riktig', tilfeldig(ROS)+' <span class="feir" aria-hidden="true">🎉</span> +10 poeng', forklaring, null);
  } else if(andreForsok){
    tilstand.poeng += 5;
    visTilbakemelding('riktig', 'Riktig på andre forsøk – godt jobbet! +5 poeng', forklaring, null);
  } else {
    tilstand.streak = 0;
    visTilbakemelding('feil', tilfeldig(TROST), forklaring, riktigSvar);
  }
  lagreTilstand(); oppdaterTavle(); byggNav();
  $('#neste-rad').style.display='flex';
  $('#neste-knapp').addEventListener('click', nesteOppgave);
  $('#neste-knapp').focus();
}
function visTilbakemelding(type, tittel, forklaring, riktigSvar){
  const t = $('#tilbakemelding');
  t.className = 'tilbakemelding vis '+type;
  t.innerHTML = `<span class="tm-tittel">${tittel}</span>
    ${riktigSvar?`<p class="tm-forklaring"><strong>Riktig svar:</strong> ${esc(riktigSvar)}</p>`:''}
    ${forklaring?`<p class="tm-forklaring">💡 ${forklaring}</p>`:''}`;
}
function nesteOppgave(){
  const t = TEMAER.find(x=>x.id===okt.temaId);
  if(okt.indeks+1 < t.oppgaver.length){ okt.indeks++; tegnOppgave(); window.scrollTo({top:0}); }
  else visFullfort();
}

/* ---------- Fullført tema ---------- */
function visFullfort(){
  const t = TEMAER.find(x=>x.id===okt.temaId);
  const d = temaData(okt.temaId);
  const antallRiktig = okt.resultater.filter(r=>r===true).length;
  const prosent = Math.round(antallRiktig/t.oppgaver.length*100);
  d.fullfort = true;
  d.besteProsent = Math.max(d.besteProsent, prosent);
  lagreTilstand(); byggNav();
  const neste = TEMAER[TEMAER.indexOf(t)+1];
  let melding, ikon;
  if(prosent>=80){ ikon='🏆'; melding='Fantastisk! Du mestrer dette temaet. Du er klar for neste steg på veien mot A2!'; }
  else if(prosent>=50){ ikon='💪'; melding='Godt jobbet! Du kan mye allerede. Øv en gang til, så sitter det enda bedre.'; }
  else { ikon='🌱'; melding='Bra at du øver! Les forklaringen en gang til og prøv på nytt – det er slik vi lærer.'; }
  $('#visning').innerHTML = `
  <article class="kort fullfort-skjerm">
    <span class="stor-ikon" aria-hidden="true">${ikon}</span>
    <h3>Tema fullført: ${t.tittel}</h3>
    <p>${melding}</p>
    <div class="resultat-tall">
      <div class="resultat-boks"><span class="rt-tall">${antallRiktig}/${t.oppgaver.length}</span><span class="rt-navn">Riktige svar</span></div>
      <div class="resultat-boks"><span class="rt-tall">${prosent}%</span><span class="rt-navn">Resultat</span></div>
      <div class="resultat-boks"><span class="rt-tall">${tilstand.poeng}</span><span class="rt-navn">Poeng totalt</span></div>
    </div>
    <div class="knapp-rad" style="justify-content:center">
      ${prosent<80?`<button class="knapp knapp-amber" id="prov-igjen">Øv på temaet igjen</button>`:''}
      ${neste?`<button class="knapp knapp-primar" id="neste-tema">Neste tema: ${neste.tittel} →</button>`:''}
      <button class="knapp knapp-sekundar" id="se-fremgang">Se min fremgang</button>
    </div>
  </article>`;
  const pi=$('#prov-igjen'); if(pi) pi.addEventListener('click',()=>vis({type:'ovelse', id:t.id}));
  const nt=$('#neste-tema'); if(nt) nt.addEventListener('click',()=>vis({type:'tema', id:neste.id}));
  $('#se-fremgang').addEventListener('click',()=>vis({type:'fremgang'}));
}

/* ---------- MIN FREMGANG ---------- */
function visFremgang(){
  const n = nivaFor(tilstand.poeng);
  const nesteNiva = NIVAER.find(x=>x.grense>tilstand.poeng);
  const fullforte = TEMAER.filter(t=>tilstand.temaer[t.id]&&tilstand.temaer[t.id].fullfort).length;
  const mestrede = TEMAER.filter(t=>{const d=tilstand.temaer[t.id]; return d&&d.fullfort&&d.besteProsent>=80;}).length;
  $('#visning').innerHTML = `
  <article class="kort">
    <p class="eyebrow">Resultatmodul</p>
    <h2>📊 Min fremgang</h2>
    <div class="niva-banner">
      <span class="nb-ikon" aria-hidden="true">${n.ikon}</span>
      <div>
        <div class="nb-navn">Nivå: ${n.navn}</div>
        <div class="nb-info">${nesteNiva ? `Du har ${tilstand.poeng} poeng. Du trenger ${nesteNiva.grense - tilstand.poeng} poeng til for å bli «${nesteNiva.navn}».` : `Du har ${tilstand.poeng} poeng og har nådd høyeste nivå. Imponerende!`}</div>
      </div>
    </div>
    <div class="resultat-tall" style="justify-content:flex-start">
      <div class="resultat-boks"><span class="rt-tall">${tilstand.poeng}</span><span class="rt-navn">Poeng</span></div>
      <div class="resultat-boks"><span class="rt-tall">${tilstand.besteStreak}</span><span class="rt-navn">Beste rekke 🔥</span></div>
      <div class="resultat-boks"><span class="rt-tall">${fullforte}/${TEMAER.length}</span><span class="rt-navn">Temaer fullført</span></div>
      <div class="resultat-boks"><span class="rt-tall">${mestrede}</span><span class="rt-navn">Temaer mestret</span></div>
    </div>
    <h3>Resultater per tema</h3>
    <div style="overflow-x:auto">
    <table class="fremgang-tabell">
      <caption class="sr-only">Oversikt over fremgangen din i alle grammatikktemaer</caption>
      <thead><tr><th scope="col">Tema</th><th scope="col">Oppgaver besvart</th><th scope="col">Beste resultat</th><th scope="col">Status</th></tr></thead>
      <tbody>
      ${TEMAER.map((t,i)=>{
        const d = tilstand.temaer[t.id];
        const mestret = d&&d.fullfort&&d.besteProsent>=80;
        let merke = '<span class="status-merke ikke">Ikke startet</span>';
        if(mestret) merke='<span class="status-merke mestret">Mestret ⭐</span>';
        else if(d&&d.fullfort) merke='<span class="status-merke fullfort">Fullført</span>';
        else if(d&&d.besvart>0) merke='<span class="status-merke pabegynt">Påbegynt</span>';
        return `<tr><td>${t.ikon} ${i+1}. ${t.tittel}</td>
          <td>${d?Math.min(d.besvart,t.oppgaver.length):0} av ${t.oppgaver.length}</td>
          <td>${d&&d.fullfort?d.besteProsent+'%':'–'}</td>
          <td>${merke}</td></tr>`;
      }).join('')}
      </tbody>
    </table>
    </div>
    <div class="knapp-rad">
      <button class="knapp knapp-primar" id="fortsett-ovelse">Fortsett å øve →</button>
      <button class="knapp knapp-sekundar knapp-liten" id="nullstill">Nullstill all fremgang</button>
    </div>
  </article>`;
  $('#fortsett-ovelse').addEventListener('click',()=>{
    const neste = TEMAER.find(t=>!(tilstand.temaer[t.id]&&tilstand.temaer[t.id].fullfort)) || TEMAER[0];
    vis({type:'tema', id:neste.id});
  });
  $('#nullstill').addEventListener('click',()=>{
    if(confirm('Er du sikker? All fremgangen din blir slettet.')){
      tilstand = {poeng:0, streak:0, besteStreak:0, temaer:{}};
      lagreTilstand(); oppdaterTavle(); vis({type:'fremgang'});
    }
  });
}

/* ---------- Start ---------- */
oppdaterTavle();
byggNav();
vis({type:'hjem'});
</script>
</body>
</html>
